global
    log stdout format raw local0

defaults
    mode tcp
    timeout connect 10s
    timeout client 300s
    timeout server 300s

# Inbound mode: sites use secondary-egress:8118; HAProxy forwards to Privoxy on the second server via the reverse tunnel.
frontend http_proxy_frontend
    bind 0.0.0.0:8118
    default_backend http_proxy_backend

backend http_proxy_backend
    server inbound_upstream __INBOUND_UPSTREAM__

# Per-site HTTP routing for HAProxy (ACLs above ## backend ##, backends below)

    acl host_example_com hdr(host) -i example.com
    use_backend example_com_backend if host_example_com

## backend ##

backend example_com_backend
    mode http
    # HAProxy → container HTTPS; public TLS terminates on HAProxy (certbot)
    server example-com example-com:443 ssl verify none

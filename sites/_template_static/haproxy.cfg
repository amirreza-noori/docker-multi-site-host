# HAProxy routing for this site — frontend ACLs above, backends below.
# Edit domain; container_name in docker-compose must match the server name in backend.

    acl host_example_com hdr(host) -i example.com
    use_backend example_com_backend if host_example_com

## backend ##

backend example_com_backend
    mode http
    server example-com example-com:80
